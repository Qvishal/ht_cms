services:
  postgres:
    image: postgres:16-alpine
    container_name: ht_cms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ht_cms
      POSTGRES_USER: ht_cms
      POSTGRES_PASSWORD: ht_cms
    ports:
      - "5432:5432"
    volumes:
      - ht_cms_pgdata:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    container_name: ht_cms_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ht_cms
      MYSQL_USER: ht_cms
      MYSQL_PASSWORD: ht_cms
      MYSQL_ROOT_PASSWORD: ht_cms_root
    ports:
      - "3307:3306"
    command: >
      --sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    volumes:
      - ht_cms_mysqldata:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: ht_cms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ht_cms_redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  varnish:
    image: varnish:7-alpine
    container_name: ht_cms_varnish
    restart: "no"
    ports:
      - "6081:80"
    volumes:
      - ../backend/config/varnish.vcl:/etc/varnish/default.vcl:ro
    environment:
      VARNISH_CONFIG: /etc/varnish/default.vcl
      VARNISH_MEMORY: 256m
    command: varnishd -f /etc/varnish/default.vcl -s malloc,256m -a 0.0.0.0:80 -T 0.0.0.0:6082 -F
    depends_on:
      - postgres
      - redis

volumes:
  ht_cms_pgdata:
  ht_cms_mysqldata:
  ht_cms_redisdata:
